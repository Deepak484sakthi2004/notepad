services:
  db:
    image: postgres:16-alpine
    container_name: notespace_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: notespace
      POSTGRES_PASSWORD: notespace
      POSTGRES_DB: notespace
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notespace"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notespace_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notespace_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://notespace:notespace@db:5432/notespace
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-too}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - uploads:/app/uploads
    ports:
      - "5002:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notespace_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pg_data:
  uploads:
